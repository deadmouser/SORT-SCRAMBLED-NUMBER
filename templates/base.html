<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sort Scramble{% endblock %} — Sorting Algorithm Visualizer</title>
    <meta name="description" content="{% block meta_desc %}Visualize, compare, and race 6 sorting algorithms step-by-step. Built for DSA Hackathon 2026.{% endblock %}">

    <!-- Open Graph -->
    <meta property="og:title" content="Sort Scramble — Sorting Algorithm Visualizer">
    <meta property="og:description" content="Visualize, benchmark, and race 6 sorting algorithms with interactive animations.">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">

    <!-- Fonts (already in /static/fonts, loaded by main.css) -->

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/css/nav.css">
    <link rel="stylesheet" href="/static/css/main.css">

    <!-- Page-specific CSS -->
    {% block page_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    {% include "partials/nav.html" %}

    {% block content %}{% endblock %}

    <!-- Core JS -->
    <script src="/static/js/nav.js"></script>
    <script>lucide.createIcons();</script>

    <!-- Page-specific JS -->
    {% block page_js %}{% endblock %}

</body>
</html>
